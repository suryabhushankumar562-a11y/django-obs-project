{% extends 'adminbase.html' %}
{% block admin %}

<div class="gradient-bg py-5">
  <div class="container">
    <div class="card shadow-lg p-4 rounded-3">
      <h3 class="text-center mb-4 fw-bold text-primary">
        <i class="fa fa-shopping-cart"></i> View Orders
      </h3>

      <div class="table-responsive">
        <table class="table table-hover align-middle text-center">
          <thead class="table-primary">
            <tr>
              <th>S. No.</th>
              <th>Order ID</th>
              <th>Ordered By</th>
              <th>Ordered At</th>
              <th>Ordered Amount</th>
            </tr>
          </thead>
          <tbody>
            {% for x in orders %}
            <tr>
              <td>{{ forloop.counter }}</td>
              <td><span class="badge bg-info text-dark">#{{ x.id }}</span></td>
              <td>{{ x.user.name }}</td>
              <td>{{ x.orderd_at }}</td>
              <td><span class="fw-bold text-success">₹{{ x.total_amount }}</span></td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="5" class="text-muted">No orders found</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<style>
  /* Gradient background */
  .gradient-bg {
    background: linear-gradient(-45deg, #f6d365, #fda085, #a1c4fd, #c2e9fb);
     min-height: 100vh;
  }

  /* Card style */
  .card {
    border-radius: 20px;
    background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #f6d365, #fda085);
  }

  /* Table hover effect */
  .table-hover tbody tr:hover {
    background-color: #f1f9ff;
    transform: scale(1.01);
    transition: 0.3s ease-in-out;
  }
</style>

{% endblock %}
