{% extends 'adminbase.html' %}
{% load static %}

{% block extra_css %}
  <style>
    body {
      background: linear-gradient(135deg, #43cea2, #185a9d); /* green-blue gradient */
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-weight: bold;
      color: #fff;
      margin-bottom: 40px;
      text-align: center;
      text-shadow: 0px 2px 6px rgba(0,0,0,0.3);
    }

    .dashboard-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      transition: all 0.4s ease;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: #222;
      margin-bottom: 25px;
    }

    .dashboard-card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(0, 0, 0, 0.2);
      background: rgba(255, 255, 255, 0.95);
    }

    .dashboard-card h4 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #333;
    }

    .dashboard-card h2 {
      font-size: 32px;
      font-weight: bold;
      color: #185a9d;
    }

    .card-icon {
      font-size: 45px;
      color: #ff6b6b;
      transition: color 0.3s ease, transform 0.3s ease;
      display: block;
      margin-bottom: 15px;
    }

    .dashboard-card:hover .card-icon {
      color: #1dd1a1;
      transform: scale(1.2);
    }
  </style>
{% endblock %}

{% block admin %}
<div class="row">
  <div class="col-sm-12">
    <h1> Admin Dashboard </h1>
  </div>
</div>

<div class="row mt-4">
  <div class="col-sm-4">
    <div class="dashboard-card shadow">
      <i class="ti ti-user card-icon"></i>
      <h4>Total Users</h4>
      <h2>{{user_count}}</h2>
    </div>
  </div>

  <div class="col-sm-4">
    <div class="dashboard-card shadow">
      <i class="ti ti-book card-icon"></i>
      <h4>Total Books</h4>
      <h2>{{book_count}}</h2>
    </div>
  </div>

  <div class="col-sm-4">
    <div class="dashboard-card shadow">
      <i class="ti ti-shopping-cart card-icon"></i>
      <h4>Total Orders</h4>
      <h2>{{order_count}}</h2>
    </div>
  </div>

  <div class="col-sm-4">
    <div class="dashboard-card shadow">
  <i class="ti ti-shopping-cart card-icon"></i>
      <h4>Total Categories</h4>
      <h2>{{category_count}}</h2>
    </div>
  </div>

  <div class="col-sm-4">
    <div class="dashboard-card shadow">
      <i class="ti ti-currency-rupee card-icon"></i>
      <h4>Total Revenue</h4>
      <h2>0+</h2>
    </div>
  </div>
</div>
{% endblock %}
