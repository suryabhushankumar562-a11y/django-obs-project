{% extends 'userbase.html' %}
{% block user %}
<div class="row justify-content-center my-4" 
     style="min-height: 100vh; padding: 40px 0; background: linear-gradient(135deg, #f6d365, #fda085, #a1c4fd, #c2e9fb);">
  <div class="col-md-8">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden" 
         style="background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); color: white;">
      
      <!-- Header -->
      <div class="p-4 text-center">
        <h2 class="fw-bold mb-0">My Profile</h2>
      </div>

      <!-- Profile Section -->
      <div class="card-body text-center">
        <div class="position-relative d-inline-block">
          {% if user.profile %}
          <img src="{{ user.profile.url }}" 
               class="rounded-circle border border-4 border-white shadow-lg profile-img"
               width="150" height="150"/>
          {% else %}
          <img src="https://via.placeholder.com/150" 
               class="rounded-circle border border-4 border-white shadow-lg profile-img"
               width="150" height="150"/>
          {% endif %}
        </div>
        <h3 class="mt-3 fw-bold">{{ user.name }}</h3>
      </div>

      <!-- Details Section -->
      <div class="px-4 pb-4">
        <table class="table table-borderless mb-0 text-white">
          <tbody>
            <tr>
              <th class="text-white-50 w-25">📞 Contact</th>
              <td class="fw-semibold">{{ user.contactno }}</td>
            </tr>
            <tr>
              <th class="text-white-50">📧 Email</th>
              <td class="fw-semibold">{{ user.email }}</td>
            </tr>
            <tr>
              <th class="text-white-50">🏠 Address</th>
              <td class="fw-semibold">{{ user.address }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Button -->
      <div class="text-center p-3 border-top border-white-25">
        <a href="{% url 'editprofile' %}" class="btn btn-lg btn-gradient px-5 shadow-sm">
          ✏️ Edit Profile
        </a>
      </div>
    </div>
  </div>
</div>

<style>
  .profile-img {
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }
  .profile-img:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .btn-gradient {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    border-radius: 50px;
    transition: 0.3s;
  }
  .btn-gradient:hover {
    background: linear-gradient(90deg, #0072ff, #00c6ff);
    transform: scale(1.05);
  }
</style>
{% endblock %}
